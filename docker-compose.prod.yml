services:
  front:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:4000}
        NEXT_PUBLIC_DEV_ROLE_BYPASS: ${NEXT_PUBLIC_DEV_ROLE_BYPASS:-false}
    restart: unless-stopped
    ports:
      - "3000:3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "const http=require('http');http.get('http://localhost:3000',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1));",
        ]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s
