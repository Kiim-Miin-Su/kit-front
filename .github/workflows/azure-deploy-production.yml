name: Azure Deploy Production

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install
        run: npm ci

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  deploy:
    runs-on: ubuntu-latest
    needs: verify
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy frontend app
        uses: azure/cli@v2
        with:
          inlineScript: |
            chmod +x infra/azure/deploy-front.sh
            export DEPLOY_ENV='production'
            export IMAGE_TAG='${{ github.sha }}'
            export PROJECT_NAME='${{ vars.PROJECT_NAME }}'
            export AZURE_RESOURCE_GROUP='${{ vars.AZURE_RESOURCE_GROUP }}'
            export AZURE_ACR_NAME='${{ vars.AZURE_ACR_NAME }}'
            export AZURE_CONTAINERAPPS_ENV='${{ vars.AZURE_CONTAINERAPPS_ENV }}'
            export AZURE_CONTAINER_APP_FRONT='${{ vars.AZURE_CONTAINER_APP_FRONT }}'
            export DOMAIN_NAME='${{ vars.DOMAIN_NAME }}'
            infra/azure/deploy-front.sh
